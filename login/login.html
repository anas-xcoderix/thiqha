<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>THIQAH ? Login</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: '#20395D',
            navyDark: '#1A2F4E',
            purple: '#7C5CBF',
            purpleLight: '#9B7FD4',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            arabic: ['Cairo', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>

  </style>
</head>
<body class="font-sans">

<div class="flex w-full h-screen gap-[3.4rem]">
  <div class="lg:flex hidden w-[40%]">
    <img src="img/sidebar.png" alt="" class="h-full w-full object-cover">
  </div>
  <div class="lg:w-[40%] w-full px-4 lg:px-0 py-10">
    <div class="px-5 lg:px-0">

      <div class="mb-10 flex justify-center md:justify-start">
        <img src="img/header.png" alt="" class="w-[200px] md:w-full md:max-w-[306px] md:aspect-[306/144.42]">
      </div>

      <h1 class="text-xl md:text-2xl font-bold text-gray-900 mb-8 text-center md:text-left">Welcome Back !</h1>

      <form class="space-y-5" onsubmit="return false;">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Email <span class="text-red-500">*</span>
          </label>
          <input type="email" placeholder="Enter Mail" class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:border-purple focus:ring-1 focus:ring-purple transition"/>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <div class="relative">
            <input id="passwordInput" type="password" placeholder="Enter Password" class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:border-purple focus:ring-1 focus:ring-purple transition pr-10"/>
            <button type="button" onclick="togglePassword()" class="eye-btn absolute right-3 top-1/2 -translate-y-1/2 text-gray-400" aria-label="Toggle password visibility">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-5 0-9-4-9-7s4-7 9-7a10.05 10.05 0 011.875.175M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18"/>
              </svg>
            </button>
          </div>
          <div class="flex justify-end mt-1">
            <a href="#" class="text-xs font-bold text-navy hover:text-purple uppercase tracking-wide">Forget Password ?</a>
          </div>
        </div>

        <div class="flex items-center gap-2">
          <input id="remember" type="checkbox" class="w-4 h-4 rounded border-gray-300 accent-navy cursor-pointer"/>
          <label for="remember" class="text-sm text-gray-700 cursor-pointer select-none">Remember me</label>
        </div>

        <button type="submit" class="w-full bg-navy hover:bg-navyDark text-white font-semibold py-3 rounded text-sm tracking-wide transition-colors duration-200">
          Log In
        </button>

      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        Don't have an account ?
        <a href="#" class="font-bold text-navy hover:text-purple ml-1 transition-colors">Create account</a>
      </p>

    </div>
  </div>
</div>
<script src="script.js">

</script>
</body>
</html>
